name: CI/CD Security and Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck on scripts
        run: |
          echo "Checking scripts with shellcheck..."
          make check-shell

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: toolbox
          path: scripts
          retention-days: 1

  deploy-dev:
    name: Deploy to Development Environment
    needs: build
    # Only deploy on merge/push to main. Skip if this is a Release Please PR being merged.
    if: "${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(main): release') }}"
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: toolbox

      - name: Deploy to Dev
        run: echo "Deploying to Development Environment..."
        # Replace this with your actual dev deployment script

      - name: Store Dev Deployment Artifact
        uses: actions/upload-artifact@v7
        with:
          name: toolbox-dev
          path: scripts
          retention-days: 7

